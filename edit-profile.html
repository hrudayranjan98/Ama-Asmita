<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Edit Profile | Ama Asmita
    </title>

    <link
        rel="icon"
        href="assets/icons/favicon.png">

    <!-- Bootstrap -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Global CSS -->

    <link
        rel="stylesheet"
        href="css/style.css">

    <!-- Edit Profile CSS -->

    <link
        rel="stylesheet"
        href="css/edit-profile.css">

</head>

<body>

<div class="floating-bg"></div>

<!-- HERO -->

<section class="edit-profile-section">

    <div class="container">

    <a
            href="index.html"
            class="back-btn">

            <i class="bi bi-arrow-left"></i>

            Back To Home

        </a>

        <!-- PAGE TITLE -->

        <div class="page-header text-center">

            <div class="hero-badge">

                <i class="bi bi-person-gear"></i>

                Profile Settings

            </div>
        </div>

        <!-- PROFILE IMAGE -->

        <div class="profile-image-section">

            <div class="profile-image-wrapper">

                <img
                    id="profilePreview"
                    src="assets/images/default-user.png"
                    alt="Profile">

                <label
                    for="profileImage"
                    class="upload-btn">

                    <i class="bi bi-pencil-fill"></i>

                </label>

                <input
                    type="file"
                    id="profileImage"
                    accept="image/*"
                    hidden>

            </div>

        </div>

        <!-- FORM CARD -->

        <div class="profile-card">

            <!-- PERSONAL INFORMATION -->

            <div class="form-section">

                <h3>

                    Personal Information

                </h3>

                <div class="row g-4">

                    <div class="col-md-6">

                        <label>

                            Name

                        </label>

                        <input
                            type="text"
                            id="name"
                            class="form-control">

                    </div>

                    <div class="col-md-6">

                        <label>

                            Username

                        </label>

                        <input
                            type="text"
                            id="userName"
                            class="form-control">

                    </div>

                    <div class="col-md-12">

                        <label>

                            Email

                        </label>

                        <input
                            type="email"
                            id="email"
                            class="form-control">

                    </div>

                </div>

            </div>

            <!-- ABOUT -->

            <div class="form-section">

                <h3>

                    About Me

                </h3>

                <textarea
                    id="bio"
                    rows="4"
                    class="form-control">

                </textarea>

            </div>

            <!-- LOCATION -->

            <div class="form-section">

                <h3>

                    Location

                </h3>

                <input
                    type="text"
                    id="address"
                    class="form-control"
                    placeholder="District">

            </div>

            <!-- SOCIAL MEDIA -->

            <div class="form-section">

                <h3>

                    Social Media

                </h3>

                <div class="row g-4">

                    <div class="col-md-4">

                        <label>

                            Facebook

                        </label>

                        <input
                            type="text"
                            id="facebook"
                            class="form-control">

                    </div>

                    <div class="col-md-4">

                        <label>

                            Instagram

                        </label>

                        <input
                            type="text"
                            id="instagram"
                            class="form-control">

                    </div>

                    <div class="col-md-4">

                        <label>

                            LinkedIn

                        </label>

                        <input
                            type="text"
                            id="linkedin"
                            class="form-control">

                    </div>

                </div>

            </div>

            <!-- SAVE BUTTON -->

            <div class="save-section">

                <button
                    id="saveBtn"
                    class="save-btn"
                    disabled>

                    Save Changes

                </button>

            </div>

        </div>

    </div>

</section>

<!-- ==========================================
SUCCESS MODAL
========================================== -->

<div id="successModal" class="custom-modal">

    <div class="success-modal-content">

        <div class="success-icon-wrapper">

            <div class="success-icon">

                <i class="bi bi-check-circle-fill"></i>

            </div>

        </div>

        <h3 id="successTitle">

            Profile Updated

        </h3>

        <p id="successMessage">

            Your profile has been updated successfully.

        </p>

        <button
            id="successCloseBtn"
            class="success-close-btn">

            Close

        </button>

    </div>

</div>

<script src="js/auth.js"></script>
<script src="js/edit-profile.js"></script>
<script src="js/main.js"></script>

</body>

</html>
