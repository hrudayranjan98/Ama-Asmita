<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login | Ama Asmita</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">


    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="css/login.css">

    <link rel="stylesheet"
      href="css/style.css">

</head>

<body>

    <!-- Background Shapes -->

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <!-- Login Container -->

    <section class="login-section">

        <div class="login-card">

            <!-- Logo -->

            <div class="login-header">

                <img
                    src="assets/icons/logo.png"
                    alt="Ama Asmita Logo"
                    class="login-logo">

                <h1>
                    Welcome Back
                </h1>

                <p>
                    Login to continue your journey with
                    Ama Asmita
                </p>

            </div>

            <!-- Validation Alert -->

            <div
                id="formAlert"
                class="form-alert">

                <i class="bi bi-exclamation-circle-fill"></i>

                <span>

                    Please Fill The Mandatory Fields

                </span>

            </div>

            <!-- Login Form -->

            <form id="loginForm">

                <!-- Email -->

                <div class="form-group">

                    <label>

                        Email Address
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Enter Email Address">

                    <small
                        class="error-text"
                        id="emailError">
                    </small>

                </div>

                <!-- Username -->

                <div class="form-group">

                    <label>

                        Username
                    </label>

                    <input
                        type="text"
                        id="username"
                        placeholder="Enter Username">

                    <small
                        class="error-text"
                        id="usernameError">
                    </small>

                </div>

                <!-- Password -->

                <div class="form-group">

                    <label>

                        Password
                    </label>

                    <div class="password-box">

                        <input
                            type="password"
                            id="password"
                            placeholder="Enter Password">

                        <button
                            type="button"
                            id="togglePassword">

                            <i
                                class="bi bi-eye-slash"
                                id="passwordIcon">
                            </i>

                        </button>

                    </div>

                    <small
                        class="error-text"
                        id="passwordError">
                    </small>

                </div>

                <!-- Remember Password -->

                <div class="remember-section">

                    <label class="remember-label">

                        <input
                            type="checkbox"
                            id="rememberPassword">

                        <span>

                            Save Password

                        </span>

                    </label>

                </div>

                <!-- Captcha -->

                <div class="captcha-section">

                    <label>

                        Verification Code
                    </label>

                    <div class="captcha-box">

                        <div
                            id="captchaCode"
                            class="captcha-code">

                            A8X4P

                        </div>

                        <button
                            type="button"
                            id="refreshCaptcha">

                            <i
                                class="bi bi-arrow-clockwise">
                            </i>

                        </button>

                    </div>

                    <input
                        type="text"
                        id="captchaInput"
                        placeholder="Enter Captcha">

                    <small
                        class="error-text"
                        id="captchaError">
                    </small>

                </div>

                <!-- Login Button -->

                <button
                    type="submit"
                    class="login-btn"
                    id="loginBtn">

                    <span id="loginBtnContent">

                        <i class="bi bi-box-arrow-in-right"></i>
                        Login

                    </span>

                    <span
                        id="loginLoader"
                        class="btn-loader d-none">

                        <span class="spinner"></span>
                        Signing In...

                    </span>

                </button>

            </form>

            <!-- Footer -->

            <div class="register-section">

                <p>

                    Don't Have An Account?

                </p>

                <a
                    href="register.html"
                    class="register-btn">

                    Sign Up

                </a>

            </div>

        </div>

    </section>

    <!-- LOGIN FAILED MODAL -->

<div
    id="loginFailedModal"
    class="custom-modal">

    <div class="custom-modal-content">

        <div class="failed-icon">

            <i class="bi bi-x"></i>

        </div>

        <h3>
            Login Failed
        </h3>

        <p id="loginFailedMessage">

            Invalid credentials.

        </p>

        <button
            id="closeFailedModal"
            class="modal-btn">

            Try Again

        </button>

    </div>

</div>

    <script src="js/login.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
